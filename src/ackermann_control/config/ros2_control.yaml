controller_manager: #声明“有哪些控制器、控制器类型是什么”
  ros__parameters:
    update_rate: 100  #控制器每秒更新 100 次  每 0.01 秒向 Gazebo 同步一次控制命令
    use_sim_time: true #使用 Gazebo 仿真时间   仿真暂停时，控制器时间也跟着暂停

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    front_steer_position_controller:
      type: position_controllers/JointGroupPositionController

    rear_wheel_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController


front_steer_position_controller:  #给具体控制器传参数，例如它控制哪些 joint
  ros__parameters:
    joints:
      - front_left_steer_joint
      - front_right_steer_joint


rear_wheel_velocity_controller:  #给具体控制器传参数，例如它控制哪些 joint
  ros__parameters:
    joints:
      - rear_left_wheel_joint
      - rear_right_wheel_joint
